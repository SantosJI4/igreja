<head>
    <meta charset="UTF-8">
    <title>Login Administrativo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin_estilo.css') }}">
</head>
<body class="login-body"> <div class="login-box">
        <h2>Acesso Restrito</h2>
        <p class="subtitulo">Insira suas credenciais de administrador</p>
        
        {% if erro %}
            <div class="alerta-erro">{{ erro }}</div>
        {% endif %}
        
        <form action="/admin/login" method="POST">
            <div class="form-group">
                <label>Usuário:</label>
                <input type="text" name="usuario" required autocomplete="off">
            </div>
            <div class="form-group">
                <label>Senha:</label>
                <input type="password" name="senha" required>
            </div>
            <button type="submit" class="btn-enviar-admin">Entrar no Painel</button>
        </form>
    </div>
</body>
